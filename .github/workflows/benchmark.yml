name: Benchmarks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: windows-2025
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Build hermes (x64 Release)
        shell: cmd
        run: node .ado\scripts\build.js --platform x64 --configuration release --targets hermes

      - name: Run benchmarks
        shell: bash
        run: |
          node --experimental-strip-types \
            benchmarks/hermes-windows/bench_and_report.ts \
            --binary out/build/win32-x64-release/bin/hermes.exe

      - name: Commit baseline if missing
        if: success() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          RESULT_SRC="benchmarks/hermes-windows/bench_result.json"
          BASELINE_DST="benchmarks/hermes-windows/baseline/baseline.json"

          if [ ! -f "$RESULT_SRC" ]; then
            echo "No bench_result.json generated; skipping baseline commit."
            exit 0
          fi

          # Preserve the freshly-generated result before switching branches.
          BACKUP="$RUNNER_TEMP/bench_result.json"
          cp "$RESULT_SRC" "$BACKUP"

          # Switch to the head branch so the commit lands there.
          git fetch origin "$HEAD_REF"
          git checkout "$HEAD_REF"

          if [ -f "$BASELINE_DST" ]; then
            echo "$BASELINE_DST already exists on $HEAD_REF; nothing to commit."
            exit 0
          fi

          mkdir -p "$(dirname "$BASELINE_DST")"
          cp "$BACKUP" "$BASELINE_DST"

          # Stamp the baseline with the current time so it's traceable to a CI run.
          node -e "
            const fs = require('fs');
            const p = process.argv[1];
            const obj = JSON.parse(fs.readFileSync(p, 'utf8'));
            obj.timestamp = new Date().toISOString();
            fs.writeFileSync(p, JSON.stringify(obj, null, 4) + '\n');
          " "$BASELINE_DST"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$BASELINE_DST"
          git commit -m "Seed benchmark baseline from CI run"
          git push origin "HEAD:$HEAD_REF"

      - name: Stage results
        if: always()
        shell: bash
        run: |
          mkdir -p benchmark-results
          cp -f benchmarks/hermes-windows/bench_report.md benchmark-results/ 2>/dev/null || true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.event.pull_request.number }}" > benchmark-results/pr-number.txt
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          retention-days: 30
