#
# The Release pipeline entry point.
# It releases NuGet packages to the public ms/react-natve ADO feed and to the NuGet.org feed.
#

name: Release $(Date:yyyyMMdd).$(Rev:r)

# The triggers are overridden by the ADO pipeline definitions.
trigger: none
pr: none

variables:
  - name: System.Debug
    value: true

resources:
  pipelines:
  - pipeline: microsoft.hermes-windows
    project: ISS
    source: microsoft.hermes-windows.ci
    trigger: none

  repositories:
  - repository: CustomPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/OfficePipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@CustomPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      vmImage: windows-latest
      os: windows
    sdl:
      eslint:
        # This repo does not ship any JavaScript code. All JS/TS files are
        # test cases, benchmarks, or internal tools. Exclusions are in
        # .eslintignore at the repo root, so keep exclusions enabled.
        enableExclusions: true
      bandit:
        # This repo does not ship any Python code. All .py files are build
        # scripts, test utilities, benchmarks, or external tools (LLVM lit).
        enabled: false
      suppression:
        suppressionFile: $(Build.SourcesDirectory)\.ado\guardian\sdl\.gdnsuppress

    stages:
    - stage: nuget_publish
      displayName: Nuget publish

      jobs:
      - job: nuget_org_job
        displayName: Publish Nuget to nuget.org (1ES experiment)

        strategy:
          matrix:
            key_apitoken:
              endpointAuthParameterKey: apitoken
            key_apikey_lower:
              endpointAuthParameterKey: apikey
            key_apikey_pascal:
              endpointAuthParameterKey: ApiKey
            key_nugetkey:
              endpointAuthParameterKey: nugetkey

        templateContext:
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.hermes-windows
            artifactName: published-packages
            targetPath: '$(Pipeline.Workspace)/published-packages'

        steps:
        - script: dir /S $(Pipeline.Workspace)\published-packages
          displayName: Show directory contents

        - task: AzureCLI@2
          displayName: Override endpoint with fake key
          inputs:
            azureSubscription: ESRP-JSHost3
            visibleAzLogin: false
            scriptType: 'pscore'
            scriptLocation: 'inlineScript'
            inlineScript: |
              $nugetOrgApiKey = "FAKE-NUGET-API-KEY-$(endpointAuthParameterKey)-EXPERIMENT"
              $hashBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($nugetOrgApiKey))
              $hash = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
              Write-Host "Fake API key for experiment: $nugetOrgApiKey"
              Write-Host "Fake API key SHA256: $hash"
              Write-Host "Trying endpoint auth parameter key: $(endpointAuthParameterKey)"
              # Endpoint ID for 'nuget.org/cxe/hermes-windows'.
              Write-Host "##vso[task.setendpoint id=f15cbb2b-c0a8-4325-a866-960fa0bec9af;field=authParameter;key=$(endpointAuthParameterKey)]$nugetOrgApiKey"

        - task: AzureCLI@2
          displayName: Dump endpoint auth parameter hashes
          inputs:
            azureSubscription: ESRP-JSHost3
            visibleAzLogin: false
            scriptType: 'pscore'
            scriptLocation: 'inlineScript'
            inlineScript: |
              $endpointId = 'f15cbb2b-c0a8-4325-a866-960fa0bec9af'
              $prefix = "ENDPOINT_AUTH_PARAMETER_${endpointId}_".ToUpper().Replace('-', '_')
              Write-Host "Endpoint auth parameter env hashes for prefix: $prefix"
              Get-ChildItem Env: |
                Where-Object { $_.Name -like "$prefix*" } |
                Sort-Object Name |
                ForEach-Object {
                  $value = $_.Value
                  $hashBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($value))
                  $hash = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
                  Write-Host "$($_.Name)_SHA256=$hash"
                }

        - task: 1ES.PublishNuGet@1
          displayName: NuGet push to nuget.org (experiment)
          continueOnError: true
          inputs:
            useDotNetTask: false
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/Microsoft.JavaScript.Hermes.*.nupkg'
            nuGetFeedType: external
            publishFeedCredentials: 'nuget.org/cxe/hermes-windows'
            externalEndpoint: 'nuget.org/cxe/hermes-windows'
            publishPackageMetadata: true

